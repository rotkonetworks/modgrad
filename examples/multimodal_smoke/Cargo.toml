[package]
name = "multimodal_smoke"
version = "0.1.0"
edition = "2024"
description = "Proof-of-life: text + image VQ codes flow through UnifiedTokenizer → QwenCerebellum → modality-aware cortex projection."

[[bin]]
name = "multimodal_smoke"
path = "src/main.rs"

[dependencies]
modgrad-ctm        = { path = "../../crates/modgrad-ctm", features = ["rocm"] }
modgrad-transformer = { path = "../../crates/modgrad-transformer", features = ["rocm"] }
modgrad-compute    = { path = "../../crates/modgrad-compute", features = ["rocm"] }
modgrad-device     = { path = "../../crates/modgrad-device", features = ["rocm"] }
modgrad-data       = { path = "../../crates/modgrad-data" }

[features]
default = []
