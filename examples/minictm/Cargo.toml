[package]
name = "minictm"
version = "0.1.0"
edition = "2024"
description = "nanoGPT but for CTMs — build your own brain with the modgrad SDK"
license = "MIT"

[[bin]]
name = "minictm"
path = "src/main.rs"

# SDK crates + isis runtime for English challenges
[dependencies]
modgrad-ctm = { path = "../../crates/modgrad-ctm" }
modgrad-compute = { path = "../../crates/modgrad-compute" }
modgrad-training = { path = "../../crates/modgrad-training" }
modgrad-persist = { path = "../../crates/modgrad-persist" }
modgrad-runtime = { path = "../../isis/runtime" }
serde = { version = "1", features = ["derive"] }
