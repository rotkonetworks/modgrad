# nginx server block for OCR Online — installed inside the dockers
# LXCs on bkk07 and bkk08. Mirrors what `deploy/push.sh` assumes.
#
# Path: /etc/nginx/sites-available/ocr.rotko.net
#       (symlinked to /etc/nginx/sites-enabled/)
#
# The site listens on port 80 only — TLS termination is haproxy's job.
# CSP and X-Frame-Options are per-location: the SPA gets SAMEORIGIN +
# frame-ancestors 'self', while /embed.html is intentionally
# embeddable from any origin (that is the point of the embed API).

server {
    listen 80;
    server_name ocr.rotko.net;
    root /srv/ocr-site;
    index index.html;

    types {
        application/manifest+json webmanifest;
        image/svg+xml svg svgz;
        application/javascript js mjs;
        text/css css;
        text/html html;
        application/json json;
        text/plain txt;
        application/wasm wasm;
        image/png png;
        image/jpeg jpg jpeg;
        image/webp webp;
        image/x-icon ico;
        application/pdf pdf;
        font/woff2 woff2;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options nosniff always;
    }

    location = /embed-client.js {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate" always;
        add_header X-Content-Type-Options nosniff always;
        types { application/javascript js; }
    }

    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header X-Content-Type-Options nosniff always;
        types { application/javascript js; }
    }

    location = /manifest.webmanifest {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options nosniff always;
    }

    # Social share image. Must be cross-origin embeddable by Twitter,
    # Slack, Discord, LinkedIn, Telegram link unfurlers — so no app CSP.
    location = /og.svg {
        try_files $uri =404;
        default_type image/svg+xml;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Structured content the SPA fetches at runtime. Short cache so
    # copy edits land within an hour.
    location = /content.json {
        try_files $uri =404;
        default_type application/json;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header X-Content-Type-Options nosniff always;
    }

    location = /embed.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net https://media.githubusercontent.com https://raw.githubusercontent.com; img-src 'self' data: blob:; style-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors *" always;
    }

    location / {
        try_files $uri /index.html;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net https://media.githubusercontent.com https://raw.githubusercontent.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }

    location = /robots.txt  { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }
    location = /__health    { return 200 "ok\n"; default_type text/plain; }
}
