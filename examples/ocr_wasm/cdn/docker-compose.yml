services:

  minio:
    image: minio/minio:latest
    container_name: cdn-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Site name shows up in `mc admin info` and replication graphs.
      MINIO_SITE_NAME: ${MINIO_SITE_NAME:-bkk}
      # Region label for the bucket; pretty cosmetic, the browser cares
      # about the URL not the region.
      MINIO_SITE_REGION: bkk
    volumes:
      - ./data:/data
    expose:
      - "9000"
      - "9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 15s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: cdn-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
