[package]
name = "modgrad-ctm"
version = "0.1.0"
edition = "2024"
description = "Continuous Thought Machine architecture for the modgrad ML SDK"
license = "MIT"

[features]
# Plumb backend features through to modgrad-device so downstream
# binaries can turn on GPU backends via a single feature on this crate.
default = []
kfd = ["modgrad-device/kfd"]
rocm = ["modgrad-device/rocm"]
cuda = ["modgrad-device/cuda"]
gpu = ["modgrad-device/gpu"]

[dependencies]
modgrad-traits = { path = "../modgrad-traits" }
modgrad-compute = { path = "../modgrad-compute" }
modgrad-device = { path = "../modgrad-device" }
modgrad-persist = { path = "../modgrad-persist" }
modgrad-memory = { path = "../modgrad-memory" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wincode = "0.5"
wincode-derive = "0.4"
half = "2"
rayon = "1"
bincode = "1"
# Pure-Rust SIMD GEMM (cache-blocked matmul). Used by the FFN cerebellum
# for ~10-30x speedup over scalar rayon loops.
matrixmultiply = "0.3"

[dev-dependencies]
serde_json = "1"
